name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'ci-dummy-key' }}
      APP_ENV: development
      CHROMA_PERSIST_PATH: /tmp/chroma
      QUERY_LOG_PATH: /tmp/logs/queries.db
      CORPUS_PATH: /tmp/corpus
      EMBEDDING_MODEL: intfloat/multilingual-e5-large
      CRAG_CORRECT_THRESHOLD: "0.5"
      CRAG_INCORRECT_THRESHOLD: "0.2"
      RETRIEVAL_TOP_K: "8"
      RETRIEVAL_FINAL_K: "5"
      SELF_RAG_MAX_RETRIES: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create temp dirs
        run: mkdir -p /tmp/logs /tmp/corpus /tmp/chroma

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings python-dotenv \
            structlog chromadb sse-starlette pytest pytest-asyncio \
            httpx pymupdf tiktoken rich groq langgraph langchain-core \
            numpy ruff

      - name: Lint
        run: ruff check . --output-format=github --select=E,F,I --ignore=E501

      - name: Run tests
        run: |
          python -m pytest \
            tests/test_t1_scaffold.py \
            tests/test_t2_ingestion.py \
            tests/test_t4_classifier_hyde.py \
            tests/test_t5_selfcrag.py \
            tests/test_t6_generator.py \
            tests/test_t7_asr.py \
            tests/test_t8_observability.py \
            tests/test_t9_evaluation.py \
            -v --tb=short --no-cov \
            -k "not test_mmr_returns_diverse_chunks"
